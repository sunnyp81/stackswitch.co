<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#0f172a"/>
  <!-- Two horizontal switch arrows representing "stack switch" -->
  <!-- Top arrow: left to right -->
  <path d="M14 22 L38 22 L34 17 M38 22 L34 27" stroke="#6366f1" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom arrow: right to left -->
  <path d="M50 42 L26 42 L30 37 M26 42 L30 47" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Vertical connector dots -->
  <circle cx="14" cy="42" r="2.5" fill="#6366f1" opacity="0.4"/>
  <circle cx="50" cy="22" r="2.5" fill="#818cf8" opacity="0.4"/>
</svg>
